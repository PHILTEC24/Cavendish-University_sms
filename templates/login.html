<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - Cavendish University SMS</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <img src="{% static 'images/logo.png' %}" alt="Cavendish University">
      <h2>CAVENDISH UNIVERSITY</h2>
      <p>Student Records Management System</p>
    </div>
    <div class="login-divider"></div>

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label"><i class="fas fa-user"></i> Username</label>
        <input type="text" name="username" class="form-control" placeholder="Enter your username" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label"><i class="fas fa-lock"></i> Password</label>
        <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn btn-navy" style="width:100%; justify-content:center; padding:12px; font-size:15px; margin-top:8px;">
        <i class="fas fa-sign-in-alt"></i> Sign In
      </button>
    </form>

    <div style="display:flex; align-items:center; margin:20px 0 16px;">
      <div style="flex:1; height:1px; background:#e0e0e0;"></div>
      <span style="margin:0 12px; font-size:12px; color:#aaa; white-space:nowrap;">or continue with</span>
      <div style="flex:1; height:1px; background:#e0e0e0;"></div>
    </div>

    <a href="/accounts/github/login/" style="display:flex; align-items:center; justify-content:center; gap:10px; width:100%; padding:11px; background:#24292e; color:#fff; border-radius:6px; text-decoration:none; font-size:14px; font-weight:500; transition:background 0.2s;" onmouseover="this.style.background='#3a3f44'" onmouseout="this.style.background='#24292e'">
      <svg height="20" width="20" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
      </svg>
      Sign in with GitHub
    </a>

    <p style="text-align:center; font-size:12px; color:#aaa; margin-top:24px;">
      Uganda &bull; {{ current_year }}
    </p>
  </div>
</div>
</body>
</html>
